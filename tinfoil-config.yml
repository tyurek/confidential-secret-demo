# Measured workload config (the "tenant"). measure-image-action hashes THIS file
# (sha256 → tinfoil-config-hash) and bakes it into the cmdline it measures, so the
# dev-launch must boot with this exact file (no debug injection — see README).
#
# cvm-version must be a cvmimage-fork release that ships the split raw (so box2 can
# reconstruct the raw to dev-launch). Cut that release first, then set it here.
cvm-version: "0.0.0.6"

cpus: 4
memory: 4096

shim:
  upstream-port: 8080
  tls-mode: self-signed

containers:
  - name: "secret-demo"
    # Pin by digest in real use (image is part of the measured config); a tag is
    # fine for the demo since measure + dev-launch read the same file bytes.
    image: "docker.io/library/nginx:alpine"
    restart: always
    read_only: false
    cap_add: ["CHOWN", "SETUID", "SETGID", "DAC_OVERRIDE", "KILL"]
    secrets: [DEMO_SECRET]
    command:
      - /bin/sh
      - -c
      - |
        echo "tinfoil-demo: DEMO_SECRET=[$DEMO_SECRET] len=${#DEMO_SECRET}"
        # Serve a non-leaking confirmation so the secret can be verified through the
        # shim (curl the host port) — the matching dev-launch is non-debug, so no SSH.
        cat > /etc/nginx/conf.d/default.conf <<EOF
        server {
          listen 8080 default_server;
          location /health       { return 200 'ok\n'; }
          location /secret-check { return 200 'DEMO_SECRET len=${#DEMO_SECRET}\n'; }
        }
        EOF
        nginx -g 'daemon off;'
